name: Security

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-supply-chain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Install cargo-audit and cargo-deny
        run: cargo install cargo-audit cargo-deny --locked

      - name: Audit Rust dependencies
        run: cargo audit --manifest-path src-tauri/Cargo.toml

      - name: Check Rust advisories and licenses
        working-directory: src-tauri
        run: cargo deny check advisories licenses bans sources
