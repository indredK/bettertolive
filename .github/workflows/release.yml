name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

env:
  CI: true

permissions:
  contents: write
  actions: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        run: bun run test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run Tauri build smoke test (no bundle)
        run: bun tauri build --debug --no-bundle

  release-build:
    name: Release Build (${{ matrix.target }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            bun tauri build --target ${{ matrix.target }} --bundles app,dmg
          else
            bun tauri build --target ${{ matrix.target }} --bundles msi,nsis
          fi

      - name: Collect macOS bundle and updater artifacts
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg artifacts/ || true
          find src-tauri/target -name "*.dmg" -exec cp {} artifacts/ \; 2>/dev/null || true
          updater_file="$(find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.app.tar.gz" | head -n 1)"
          if [ -z "$updater_file" ] || [ ! -f "${updater_file}.sig" ]; then
            echo "::error::macOS updater bundle (.app.tar.gz) not found for ${{ matrix.target }}. Build must use --bundles app,dmg with createUpdaterArtifacts enabled."
            exit 1
          fi
          case "${{ matrix.target }}" in
            aarch64-apple-darwin) updater_platform="darwin-aarch64" ;;
            x86_64-apple-darwin) updater_platform="darwin-x86_64" ;;
            *) echo "Unsupported macOS updater target: ${{ matrix.target }}" && exit 1 ;;
          esac
          updater_name="${updater_platform}-$(basename "$updater_file")"
          updater_sig_name="${updater_name}.sig"
          cp "$updater_file" "artifacts/$updater_name"
          cp "${updater_file}.sig" "artifacts/$updater_sig_name"
          bun scripts/release/write-updater-manifest.mjs \
            --output-dir artifacts \
            --target "${{ matrix.target }}" \
            --platform "$updater_platform" \
            --file "artifacts/$updater_name" \
            --signature "artifacts/$updater_sig_name"

      - name: Collect Windows bundle and updater artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Get-ChildItem -Path src-tauri/target -Recurse -Include *.msi,*.exe,*.sig | Where-Object { $_.FullName -match "bundle" } | Copy-Item -Destination artifacts/ -ErrorAction SilentlyContinue
          $preferred = Get-ChildItem -Path src-tauri/target -Recurse -File | Where-Object { $_.FullName -match "bundle" -and $_.Name -match '\.exe$' } | Select-Object -First 1
          if (-not $preferred) {
            $preferred = Get-ChildItem -Path src-tauri/target -Recurse -File | Where-Object { $_.FullName -match "bundle" -and $_.Name -match '\.msi$' } | Select-Object -First 1
          }
          if ($preferred) {
            $sigPath = "$($preferred.FullName).sig"
            if (Test-Path $sigPath) {
              Copy-Item $preferred.FullName -Destination artifacts/ -ErrorAction SilentlyContinue
              Copy-Item $sigPath -Destination artifacts/ -ErrorAction SilentlyContinue
              bun scripts/release/write-updater-manifest.mjs `
                --output-dir artifacts `
                --target "${{ matrix.target }}" `
                --platform "windows-x86_64" `
                --file "$($preferred.FullName)" `
                --signature "$sigPath"
            }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.target }}
          path: artifacts/
          retention-days: 7

  publish:
    name: Publish Release
    needs: release-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: bash scripts/ci/install-linux-deps.sh

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Ensure release exists and read metadata
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          if ! gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" --title "bettertolive ${{ github.ref_name }}" --notes ""
          fi
          gh release view "${{ github.ref_name }}" --json body,publishedAt > release-metadata.json

      - name: Generate latest.json
        run: |
          bun scripts/release/generate-updater-json.mjs \
            --assets-dir release-assets \
            --tag "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --release-metadata release-metadata.json

      - name: Verify updater signatures
        run: |
          updater_pubkey="$(node -e "const fs=require('fs'); const conf=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); process.stdout.write(conf.plugins.updater.pubkey);")"
          cargo run --manifest-path src-tauri/Cargo.toml --bin verify_updater_manifest -- \
            --latest-json release-assets/latest.json \
            --assets-dir release-assets \
            --pubkey "$updater_pubkey"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          shopt -s nullglob
          rm -f release-assets/updater-manifest-*.json
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" release-assets/* --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "bettertolive ${{ github.ref_name }}" \
              --generate-notes \
              release-assets/*
          fi
